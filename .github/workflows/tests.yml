name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  offline-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run offline test suite
        run: uv run pytest
